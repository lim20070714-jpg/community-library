<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书详情</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{padding:20px;background:#f5f5f5}
        .container{max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:10px}
        .btn{padding:10px 20px;margin:10px 5px 0 0;border:none;border-radius:5px;cursor:pointer}
        .borrow{background:#0f9d58;color:white}
        .return{background:#db4437;color:white}
        .back{background:#ccc}
        .status{font-weight:bold;font-size:18px;margin:15px 0}
    </style>
</head>
<body>
<div class="container">
    <button class="btn back" onclick="history.back()">返回</button>
    <div id="detail"></div>
</div>

<script>
let books = [];
const DATA_URL = "https://raw.githubusercontent.com/lim/community-library/main/data.json";
let currentUser = localStorage.getItem("userName") || "访客";

async function loadData() {
    const res = await fetch(DATA_URL + "?t=" + new Date().getTime());
    const data = await res.json();
    books = data.books;
    showDetail();
}

function showDetail() {
    const id = new URLSearchParams(location.search).get("id");
    const book = books.find(b => b.id == id);
    if (!book) { document.body.innerHTML = "图书不存在"; return; }
    document.getElementById("detail").innerHTML = `
        <h1>${book.title}</h1>
        <p>作者：${book.author}</p>
        <p>简介：${book.desc}</p>
        <p class="status">${book.borrowed ? "已借出：" + book.borrower : "可借阅"}</p>
        ${!book.borrowed ?
            `<button class="btn borrow" onclick="borrow(${book.id})">借阅</button>` :
            `<button class="btn return" onclick="returnBook(${book.id})">归还</button>`
        }
    `;
}

async function borrow(id) {
    await loadData();
    const book = books.find(b => b.id == id);
    if (book.borrowed) { alert("已被借走！"); return; }
    book.borrowed = true;
    book.borrower = currentUser;
    alert("借阅成功");
    location.reload();
}

async function returnBook(id) {
    await loadData();
    const book = books.find(b => b.id == id);
    if (book.borrower !== currentUser) { alert("不能归还他人书籍"); return; }
    book.borrowed = false;
    book.borrower = "";
    alert("已归还");
    location.reload();
}

loadData();
</script>
</body>
</html>
