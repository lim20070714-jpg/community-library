<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书详情 - 社区图书馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .book-detail h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .book-detail p {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
            color: #555;
        }
        .book-detail .status {
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0;
        }
        .status.available {
            color: #2ecc71;
        }
        .status.unavailable {
            color: #e74c3c;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        .borrow-btn {
            background: #2ecc71;
            color: white;
        }
        .return-btn {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="book-detail" id="bookDetail">
            <!-- 图书详情由JS动态生成 -->
        </div>
    </div>

    <script>
        // 获取URL中的图书ID
        const getBookIdFromUrl = () => {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id')) || 0;
        };

        // 渲染图书详情
        const renderBookDetail = () => {
            const bookId = getBookIdFromUrl();
            const books = JSON.parse(localStorage.getItem('books')) || [];
            const book = books.find(b => b.id === bookId);

            const bookDetailEl = document.getElementById('bookDetail');
            if (!book) {
                bookDetailEl.innerHTML = '<h1>图书不存在</h1><p>您访问的图书信息不存在，请返回首页重试。</p>';
                return;
            }

            bookDetailEl.innerHTML = `
                <h1>${book.title}</h1>
                <p><strong>作者：</strong>${book.author}</p>
                <p><strong>图书简介：</strong>${book.desc}</p>
                <p class="status ${book.borrowed ? 'unavailable' : 'available'}">
                    ${book.borrowed ? '当前状态：已借出（借阅人：' + book.borrower + '）' : '当前状态：可借阅'}
                </p>
                ${book.borrowed 
                    ? `<button class="btn return-btn" onclick="returnBook(${book.id})">归还图书</button>` 
                    : `<button class="btn borrow-btn" onclick="borrowBook(${book.id})">借阅图书</button>`}
            `;
        };

        // 借阅图书（复用首页逻辑）
        const borrowBook = (bookId) => {
            const books = JSON.parse(localStorage.getItem('books')) || [];
            const bookIndex = books.findIndex(book => book.id === bookId);
            
            if (bookIndex === -1) return;
            if (books[bookIndex].borrowed) {
                alert('该书已被借出！');
                return;
            }

            const userName = prompt('请输入您的姓名：');
            if (!userName) return;

            books[bookIndex].borrowed = true;
            books[bookIndex].borrower = userName;
            localStorage.setItem('books', JSON.stringify(books));
            alert(`借阅成功！请妥善保管《${books[bookIndex].title}》`);
            renderBookDetail(); // 刷新详情页状态
        };

        // 归还图书（复用首页逻辑）
        const returnBook = (bookId) => {
            const books = JSON.parse(localStorage.getItem('books')) || [];
            const bookIndex = books.findIndex(book => book.id === bookId);
            
            if (bookIndex === -1) return;
            if (!books[bookIndex].borrowed) {
                alert('该书未被借出，无需归还！');
                return;
            }

            if (confirm(`确认归还《${books[bookIndex].title}》吗？`)) {
                books[bookIndex].borrowed = false;
                books[bookIndex].borrower = "";
                localStorage.setItem('books', JSON.stringify(books));
                alert('归还成功！');
                renderBookDetail(); // 刷新详情页状态
            }
        };

        // 页面加载初始化
        window.onload = renderBookDetail;
    </script>
</body>
</html>
