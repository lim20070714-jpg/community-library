<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区图书馆</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{padding:20px;background:#f5f5f5}
        .container{max-width:1000px;margin:0 auto;background:white;padding:20px;border-radius:10px}
        header{display:flex;justify-content:space-between;margin-bottom:20px}
        .tab{padding:10px 20px;cursor:pointer;background:#eee;border:none;margin-right:5px}
        .tab.active{background:#4285f4;color:white}
        .tab-content{display:none;margin-top:20px}
        .tab-content.active{display:block}
        .book-list,.room-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px}
        .card{border:1px solid #ddd;padding:15px;border-radius:8px}
        .btn{padding:8px 12px;margin-top:10px;border:none;border-radius:5px;cursor:pointer}
        .borrow{background:#0f9d58;color:white}
        .return{background:#db4437;color:white}
        .reserve{background:#f4b400;color:white}
        .cancel{background:#db4437;color:white}
        .detail{background:#4285f4;color:white}
        .status{font-weight:bold;margin:10px 0}
        .borrowed{color:#db4437}
        .reserved{color:#f4b400}
        .my-record{margin-top:30px}
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>社区图书馆</h1>
        <button class="btn" onclick="location.href='admin.html'">管理员</button>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="setTab(0)">图书借阅</button>
        <button class="tab" onclick="setTab(1)">活动室预约</button>
        <button class="tab" onclick="setTab(2)">我的记录</button>
    </div>

    <div class="tab-content active" id="bookTab">
        <h2>图书列表</h2>
        <div class="book-list" id="bookList"></div>
    </div>

    <div class="tab-content" id="roomTab">
        <h2>活动室</h2>
        <div class="room-list" id="roomList"></div>
    </div>

    <div class="tab-content" id="recordTab">
        <div class="my-record">
            <h3>我借阅的图书</h3>
            <div id="myBooks"></div>
        </div>
        <div class="my-record" style="margin-top:20px">
            <h3>我预约的活动室</h3>
            <div id="myRooms"></div>
        </div>
    </div>
</div>

<script>
let books = [];
let rooms = [];
let currentUser = "访客";
const DATA_URL = "https://raw.githubusercontent.com/lim/community-library/main/data.json";

function getUserName() {
    let user = localStorage.getItem("userName");
    if (!user) {
        user = prompt("请输入你的姓名：");
        if (!user) user = "访客";
        localStorage.setItem("userName", user);
    }
    currentUser = user;
}

async function loadGlobalData() {
    try {
        const res = await fetch(DATA_URL + "?t=" + new Date().getTime());
        const data = await res.json();
        books = data.books;
        rooms = data.rooms;
        renderAll();
    } catch (e) {
        alert("数据加载失败，请刷新重试");
    }
}

async function borrowBook(id) {
    await loadGlobalData();
    const book = books.find(b => b.id == id);
    if (book.borrowed) {
        alert("借阅失败：这本书已被 " + book.borrower + " 借走！");
        return;
    }
    book.borrowed = true;
    book.borrower = currentUser;
    alert("借阅成功！");
    loadGlobalData();
}

async function returnBook(id) {
    await loadGlobalData();
    const book = books.find(b => b.id == id);
    if (!book.borrowed) return;
    if (book.borrower !== currentUser) {
        alert("你不能归还别人的书！");
        return;
    }
    book.borrowed = false;
    book.borrower = "";
    alert("归还成功");
    loadGlobalData();
}

async function reserveRoom(id) {
    await loadGlobalData();
    const room = rooms.find(r => r.id == id);
    if (room.reserved) {
        alert("预约失败：该活动室已被占用！");
        return;
    }
    room.reserved = true;
    room.reserver = currentUser;
    alert("预约成功");
    loadGlobalData();
}

async function cancelRoom(id) {
    await loadGlobalData();
    const room = rooms.find(r => r.id == id);
    if (!room.reserved) return;
    room.reserved = false;
    room.reserver = "";
    alert("已取消预约");
    loadGlobalData();
}

function renderAll() {
    renderBooks();
    renderRooms();
    renderRecords();
}

function renderBooks() {
    const dom = document.getElementById("bookList");
    dom.innerHTML = "";
    books.forEach(book => {
        dom.innerHTML += `
        <div class="card">
            <h3>${book.title}</h3>
            <p>作者：${book.author}</p>
            <p class="status ${book.borrowed?'borrowed':''}">
                ${book.borrowed?'已借出：'+book.borrower:'可借阅'}
            </p>
            <button class="btn detail" onclick="location.href='book-detail.html?id=${book.id}'">详情</button>
            ${!book.borrowed ?
                `<button class="btn borrow" onclick="borrowBook(${book.id})">借阅</button>` :
                `<button class="btn return" onclick="returnBook(${book.id})">归还</button>`
            }
        </div>`;
    });
}

function renderRooms() {
    const dom = document.getElementById("roomList");
    dom.innerHTML = "";
    rooms.forEach(r => {
        dom.innerHTML += `
        <div class="card">
            <h3>${r.name}</h3>
            <p>容量：${r.capacity}人</p>
            <p>时间：${r.time}</p>
            <p class="status ${r.reserved?'reserved':''}">
                ${r.reserved?'已预约：'+r.reserver:'可预约'}
            </p>
            ${!r.reserved ?
                `<button class="btn reserve" onclick="reserveRoom(${r.id})">预约</button>` :
                `<button class="btn cancel" onclick="cancelRoom(${r.id})">取消</button>`
            }
        </div>`;
    });
}

function renderRecords() {
    const myBooks = books.filter(b => b.borrower === currentUser);
    const myRooms = rooms.filter(r => r.reserver === currentUser);
    document.getElementById("myBooks").innerHTML = myBooks.map(b => `
        <div class="card">${b.title} <button class="btn return" onclick="returnBook(${b.id})">归还</button></div>
    `).join("");
    document.getElementById("myRooms").innerHTML = myRooms.map(r => `
        <div class="card">${r.name} <button class="btn cancel" onclick="cancelRoom(${r.id})">取消</button></div>
    `).join("");
}

function setTab(index) {
    document.querySelectorAll(".tab").forEach((t,i) => {
        t.classList.toggle("active", i === index);
    });
    document.querySelectorAll(".tab-content").forEach((c,i) => {
        c.classList.toggle("active", i === index);
    });
}

window.onload = async () => {
    getUserName();
    await loadGlobalData();
};
</script>
</body>
</html>
