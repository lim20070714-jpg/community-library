<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{padding:20px;background:#f5f5f5}
        .container{max-width:900px;margin:0 auto;background:white;padding:20px;border-radius:10px}
        .login{max-width:400px;margin:50px auto;padding:20px;border:1px solid #ddd}
        input,button{width:100%;padding:10px;margin:10px 0}
        .admin{display:none}
        .card{border:1px solid #ddd;padding:15px;margin:10px 0}
        .reset-btn{background:red;color:white;padding:5px 10px;border:none;border-radius:5px;cursor:pointer}
        .back-btn{background:#ccc;padding:8px 16px;border:none;border-radius:5px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="login" id="loginBox">
        <h2>管理员登录</h2>
        <input type="password" id="pwd" placeholder="密码：admin123">
        <button onclick="adminLogin()">登录</button>
    </div>

    <div class="admin" id="adminPanel">
        <button class="back-btn" onclick="location.href='index.html'">返回首页</button>
        <h2>管理控制台</h2>
        
        <div style="margin:20px 0">
            <h3>图书管理（可重置借阅状态）</h3>
            <div id="adminBookList"></div>
        </div>

        <div style="margin:20px 0">
            <h3>活动室管理（可重置预约状态）</h3>
            <div id="adminRoomList"></div>
        </div>
    </div>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/lim/community-library/main/data.json";
let books = [], rooms = [];

async function loadAdminData() {
    const res = await fetch(DATA_URL + "?t=" + new Date().getTime());
    const data = await res.json();
    books = data.books;
    rooms = data.rooms;
    renderAdminPanel();
}

function renderAdminPanel() {
    // 渲染图书
    const bookDom = document.getElementById("adminBookList");
    bookDom.innerHTML = books.map(b => `
        <div class="card">
            <h4>${b.title}</h4>
            <p>状态：${b.borrowed ? '已借出 · 借阅人：'+b.borrower : '可借阅'}</p>
            <button class="reset-btn" onclick="resetBook(${b.id})">重置借阅状态</button>
        </div>
    `).join("");

    // 渲染活动室
    const roomDom = document.getElementById("adminRoomList");
    roomDom.innerHTML = rooms.map(r => `
        <div class="card">
            <h4>${r.name}</h4>
            <p>状态：${r.reserved ? '已预约 · 预约人：'+r.reserver : '可预约'}</p>
            <button class="reset-btn" onclick="resetRoom(${r.id})">重置预约状态</button>
        </div>
    `).join("");
}

function adminLogin() {
    const pwd = document.getElementById("pwd").value;
    if (pwd === "admin123") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadAdminData();
    } else {
        alert("密码错误！");
    }
}

async function resetBook(id) {
    await loadAdminData();
    const book = books.find(b => b.id == id);
    book.borrowed = false;
    book.borrower = "";
    alert("已重置图书状态");
    loadAdminData();
}

async function resetRoom(id) {
    await loadAdminData();
    const room = rooms.find(r => r.id == id);
    room.reserved = false;
    room.reserver = "";
    alert("已重置活动室状态");
    loadAdminData();
}
</script>
</body>
</html>
