<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 社区图书馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .login-section {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .login-section h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .login-section input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .login-section button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .admin-content {
            display: none;
            margin-top: 20px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #95a5a6;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #eee;
            border: none;
            cursor: pointer;
            margin-right: 5px;
            border-radius: 4px 4px 0 0;
        }
        .tab-btn.active {
            background: #3498db;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .book-list, .room-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .book-card, .room-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
        }
        .book-card h3, .room-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #3498db;
        }
        .book-card p, .room-card p {
            margin-bottom: 10px;
            color: #666;
        }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        .reset-btn {
            background: #e74c3c;
            color: white;
        }
        .add-book-form, .add-room-form {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .add-book-form h3, .add-room-form h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .add-book-form input, .add-room-form input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .add-btn {
            background: #2ecc71;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 管理员登录 -->
        <div class="login-section" id="loginSection">
            <h2>管理员登录</h2>
            <input type="password" id="adminPwd" placeholder="请输入管理员密码（默认：admin123）">
            <button onclick="adminLogin()">登录</button>
        </div>

        <!-- 管理员内容区 -->
        <div class="admin-content" id="adminContent">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <h2>图书馆管理后台</h2>

            <!-- 管理标签页 -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchAdminTab('manageBooks')">图书管理</button>
                <button class="tab-btn" onclick="switchAdminTab('manageRooms')">活动室管理</button>
            </div>

            <!-- 图书管理 -->
            <div id="manageBooks" class="tab-content active">
                <!-- 添加图书表单 -->
                <div class="add-book-form">
                    <h3>添加新图书</h3>
                    <input type="text" id="newBookTitle" placeholder="图书名称">
                    <input type="text" id="newBookAuthor" placeholder="作者">
                    <input type="text" id="newBookDesc" placeholder="图书简介">
                    <button class="btn add-btn" onclick="addNewBook()">添加图书</button>
                </div>

                <!-- 图书列表（管理） -->
                <h3>图书列表</h3>
                <div class="book-list" id="adminBookList"></div>
            </div>

            <!-- 活动室管理 -->
            <div id="manageRooms" class="tab-content">
                <!-- 添加活动室表单 -->
                <div class="add-room-form">
                    <h3>添加新活动室</h3>
                    <input type="text" id="newRoomName" placeholder="活动室名称">
                    <input type="number" id="newRoomCapacity" placeholder="容纳人数">
                    <input type="text" id="newRoomTime" placeholder="可预约时段（如：9:00-12:00）">
                    <button class="btn add-btn" onclick="addNewRoom()">添加活动室</button>
                </div>

                <!-- 活动室列表（管理） -->
                <h3>活动室列表</h3>
                <div class="room-list" id="adminRoomList"></div>
            </div>
        </div>
    </div>

    <script>
        // 管理员密码（可自行修改）
        const ADMIN_PASSWORD = 'admin123';

        // 管理员登录
        const adminLogin = () => {
            const inputPwd = document.getElementById('adminPwd').value;
            if (inputPwd === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderAdminBookList();
                renderAdminRoomList();
            } else {
                alert('密码错误！请重新输入');
            }
        };

        // 切换管理员标签页
        const switchAdminTab = (tabId) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        };

        // 渲染管理员图书列表
        const renderAdminBookList = () => {
            const books = JSON.parse(localStorage.getItem('books')) || [];
            const adminBookListEl = document.getElementById('adminBookList');
            adminBookListEl.innerHTML = '';

            books.forEach(book => {
                const bookCard = document.createElement('div');
                bookCard.className = 'book-card';
                bookCard.innerHTML = `
                    <h3>${book.title}</h3>
                    <p>作者：${book.author}</p>
                    <p>状态：${book.borrowed ? '已借出（'+book.borrower+'）' : '可借阅'}</p>
                    <button class="btn reset-btn" onclick="resetBookStatus(${book.id})">重置借阅状态</button>
                `;
                adminBookListEl.appendChild(bookCard);
            });
        };

        // 渲染管理员活动室列表
        const renderAdminRoomList = () => {
            const rooms = JSON.parse(localStorage.getItem('rooms')) || [];
            const adminRoomListEl = document.getElementById('adminRoomList');
            adminRoomListEl.innerHTML = '';

            rooms.forEach(room => {
                const roomCard = document.createElement('div');
                roomCard.className = 'room-card';
                roomCard.innerHTML = `
                    <h3>${room.name}</h3>
                    <p>容量：${room.capacity}人</p>
                    <p>时段：${room.time}</p>
                    <p>状态：${room.reserved ? '已预约（'+room.reserver+'）' : '可预约'}</p>
                    <button class="btn reset-btn" onclick="resetRoomStatus(${room.id})">重置预约状态</button>
                `;
                adminRoomListEl.appendChild(roomCard);
            });
        };

        // 重置图书借阅状态
        const resetBookStatus = (bookId) => {
            const books = JSON.parse(localStorage.getItem('books')) || [];
            const bookIndex = books.findIndex(book => book.id === bookId);
            
            if (bookIndex === -1) return;
            if (confirm(`确认重置《${books[bookIndex].title}》的借阅状态吗？`)) {
                books[bookIndex].borrowed = false;
                books[bookIndex].borrower = "";
                localStorage.setItem('books', JSON.stringify(books));
                alert('重置成功！');
                renderAdminBookList();
            }
        };

        // 重置活动室预约状态
        const resetRoomStatus = (roomId) => {
            const rooms = JSON.parse(localStorage.getItem('rooms')) || [];
            const roomIndex = rooms.findIndex(room => room.id === roomId);
            
            if (roomIndex === -1) return;
            if (confirm(`确认重置${rooms[roomIndex].name}的预约状态吗？`)) {
                rooms[roomIndex].reserved = false;
                rooms[roomIndex].reserver = "";
                localStorage.setItem('rooms', JSON.stringify(rooms));
                alert('重置成功！');
                renderAdminRoomList();
            }
        };

        // 添加新图书
        const addNewBook = () => {
            const title = document.getElementById('newBookTitle').value.trim();
            const author = document.getElementById('newBookAuthor').value.trim();
            const desc = document.getElementById('newBookDesc').value.trim();

            if (!title || !author || !desc) {
                alert('请填写完整图书信息！');
                return;
            }

            const books = JSON.parse(localStorage.getItem('books')) || [];
            const newBookId = books.length > 0 ? Math.max(...books.map(b => b.id)) + 1 : 1;
            
            books.push({
                id: newBookId,
                title: title,
                author: author,
                desc: desc,
                borrowed: false,
                borrower: ""
            });

            localStorage.setItem('books', JSON.stringify(books));
            alert('添加图书成功！');
            // 清空表单
            document.getElementById('newBookTitle').value = '';
            document.getElementById('newBookAuthor').value = '';
            document.getElementById('newBookDesc').value = '';
            renderAdminBookList();
        };

        // 添加新活动室
        const addNewRoom = () => {
            const name = document.getElementById('newRoomName').value.trim();
            const capacity = document.getElementById('newRoomCapacity').value.trim();
            const time = document.getElementById('newRoomTime').value.trim();

            if (!name || !capacity || !time) {
                alert('请填写完整活动室信息！');
                return;
            }

            const rooms = JSON.parse(localStorage.getItem('rooms')) || [];
            const newRoomId = rooms.length > 0 ? Math.max(...rooms.map(r => r.id)) + 1 : 1;
            
            rooms.push({
                id: newRoomId,
                name: name,
                capacity: parseInt(capacity),
                time: time,
                reserved: false,
                reserver: ""
            });

            localStorage.setItem('rooms', JSON.stringify(rooms));
            alert('添加活动室成功！');
            // 清空表单
            document.getElementById('newRoomName').value = '';
            document.getElementById('newRoomCapacity').value = '';
            document.getElementById('newRoomTime').value = '';
            renderAdminRoomList();
        };
    </script>
</body>
</html>
